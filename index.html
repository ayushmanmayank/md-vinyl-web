<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Vinyl for Windows - Spotify Integration</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%2316171b'/%3E%3Ccircle cx='32' cy='32' r='10' fill='%23e9e5dd'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Cinzel:wght@500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        (function enforceCanonicalVercelHost() {
            var legacyHost = 'md-vinyl-web.vercel.app';
            var canonicalHost = 'md-vinyl-web-eight.vercel.app';
            if (window.location.hostname === legacyHost) {
                var target = window.location.protocol + '//' + canonicalHost + window.location.pathname + window.location.search + window.location.hash;
                window.location.replace(target);
            }
        })();
    </script>
</head>
<body>
    <!-- Router Container -->
    <div id="app"></div>

    <!-- Original App Content (Home Page) -->
    <main class="desktop-shell" id="home-page" style="display: none;">
        <section class="app-window" aria-label="MD Vinyl Player">
            <div class="window-body">
                <div class="turntable-panel">
                    <div class="arm-shadow" aria-hidden="true"></div>
                    <div class="tonearm" aria-hidden="true">
                        <span class="tonearm-pivot"></span>
                        <span class="tonearm-rod"></span>
                        <span class="tonearm-head"></span>
                    </div>
                    <img class="vinyl" src="./images/vinyl-star.svg" alt="Star pattern vinyl record">
                </div>

                <aside class="info-panel">
                    <p class="status" id="statusText">Not Launched</p>
                    <h2 id="trackTitle">Open a music app to start</h2>
                    <p class="meta">MD Studio 2026</p>
                    <div class="loader-row">
                        <span id="fileName" class="file-name">No file selected</span>
                    </div>
                    <div class="source-actions" role="group" aria-label="Audio sources">
                        <button id="localFileBtn" class="source-btn" type="button">Choose Local Files</button>
                        <button id="connectFolderBtn" class="source-btn" type="button">Connect Music Folder</button>
                    </div>
                    <input id="trackFileInput" type="file" accept="audio/*" multiple hidden>
                    <div class="folder-connect-row">
                        <p id="folderHint" class="folder-hint">Choose files or connect a folder to load songs from your laptop.</p>
                    </div>

                    <section class="spotify-panel" aria-label="Spotify Embed">
                        <h3>Spotify Embed</h3>
                        <p class="spotify-hint">Paste a Spotify track, album, artist, or playlist link.</p>
                        <div class="spotify-input-row">
                            <input id="spotifyUrlInput" class="spotify-url-input" type="text" placeholder="https://open.spotify.com/track/..." aria-label="Spotify URL">
                            <button id="spotifyLoadBtn" class="spotify-load-btn" type="button">Load</button>
                        </div>
                        <div id="spotifyEmbed" class="spotify-embed" aria-label="Spotify player"></div>
                    </section>

                    <section class="playlist-panel side-playlist" aria-label="Playlist">
                        <h3>Folder Songs</h3>
                        <p id="playlistNowPlaying" class="now-playing">Now playing: None</p>
                        <ul id="playlistList" class="playlist-list"></ul>
                    </section>

                    <div class="timeline-wrap">
                        <span id="currentTime">0:00</span>
                        <input id="seekBar" type="range" min="0" max="100" value="0" step="0.1" aria-label="Seek track">
                        <span id="duration">0:00</span>
                    </div>

                    <div class="controls" role="group" aria-label="Playback controls">
                        <div class="control-cluster">
                            <button id="prevBtn" class="pill" type="button" aria-label="Previous track">&#9664;</button>
                            <span class="control-label">&#9198;</span>
                        </div>
                        <div class="control-cluster">
                            <button id="playPauseBtn" class="pill" type="button" aria-label="Play or pause">PLAY</button>
                            <span class="control-label">PLAY</span>
                        </div>
                        <div class="control-cluster">
                            <button id="nextBtn" class="pill" type="button" aria-label="Next track">&#9654;</button>
                            <span class="control-label">&#9197;</span>
                        </div>
                    </div>

                    <div class="mode-row" role="group" aria-label="Playback modes">
                        <button id="shuffleBtn" class="mode-pill" type="button" aria-pressed="false">Shuffle Off</button>
                        <button id="repeatBtn" class="mode-pill" type="button" aria-pressed="false">Repeat Off</button>
                    </div>

                    <div class="volume-row">
                        <label for="volumeSlider">Volume</label>
                        <div class="strawberry-meter" aria-hidden="true">
                            <button id="volumeDownBtn" class="volume-step-btn" type="button" aria-label="Decrease volume">-</button>
                            <span id="volumeStrawberries" class="big-strawberries">&#127827; &#127827; &#127827; &#127827;</span>
                            <button id="volumeUpBtn" class="volume-step-btn" type="button" aria-label="Increase volume">+</button>
                        </div>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <audio id="player" preload="metadata"></audio>

    <script type="module">
        import { loginWithSpotify, exchangeCodeForToken, verifyOAuthState, logout } from './src/spotify/auth.js';
        import { getCurrentUser, getUserPlaylists, getUserTopTracks, getRecommendations } from './src/spotify/api.js';

        window.spotifyAuthBridge = {
            loginWithSpotify,
            exchangeCodeForToken,
            verifyOAuthState,
            logout,
        };

        window.spotifyApiBridge = {
            getCurrentUser,
            getUserPlaylists,
            getUserTopTracks,
            getRecommendations,
        };
    </script>
    
    <!-- Router Script -->
    <script type="text/babel">
        // Simple client-side router
        const { useState, useEffect } = React;

        // Import components
        function Router() {
            const [currentPage, setCurrentPage] = useState(getInitialPage());

            function getInitialPage() {
                const path = window.location.pathname;
                const routeParam = new URLSearchParams(window.location.search).get('route');
                if (path === '/callback' || path === '/callback/' || routeParam === 'callback') return 'callback';
                if (path === '/spotify-dashboard' || path === '/spotify-dashboard/' || routeParam === 'spotify-dashboard') return 'dashboard';
                if (path === '/player' || path === '/player/' || routeParam === 'player') return 'player';
                return 'home';
            }

            useEffect(() => {
                const handleLocationChange = () => {
                    setCurrentPage(getInitialPage());
                };

                window.addEventListener('popstate', handleLocationChange);
                return () => window.removeEventListener('popstate', handleLocationChange);
            }, []);

            // Handle navigation
            const navigate = (path, state = null) => {
                window.history.pushState(state, '', path);
                setCurrentPage(getInitialPage());
            };

            return (
                <>
                    {currentPage === 'home' && <HomePage onNavigate={navigate} />}
                    {currentPage === 'callback' && <CallbackPageComponent />}
                    {currentPage === 'dashboard' && <DashboardPageComponent onNavigate={navigate} />}
                    {currentPage === 'player' && <PlayerPageComponent onNavigate={navigate} />}
                </>
            );
        }

        // Home Page Component
        function HomePage({ onNavigate }) {
            useEffect(() => {
                // Show the original vinyl player HTML
                document.getElementById('home-page').style.display = 'block';
                return () => {
                    document.getElementById('home-page').style.display = 'none';
                };
            }, []);

            return (
                <div>
                    <div style={{
                        position: 'absolute',
                        top: '10px',
                        right: '10px',
                        zIndex: 1000,
                    }}>
                        <button
                            onClick={() => {
                                if (window.spotifyAuthBridge?.loginWithSpotify) {
                                    window.spotifyAuthBridge.loginWithSpotify();
                                } else {
                                    console.error('Spotify auth bridge not loaded yet.');
                                }
                            }}
                            style={{
                                backgroundColor: '#b10d2e',
                                color: '#f7ecef',
                                border: '1px solid #d9d5ce',
                                padding: '10px 20px',
                                borderRadius: '24px',
                                cursor: 'pointer',
                                fontWeight: 'bold',
                            }}
                        >
                            🎵 Connect Spotify
                        </button>
                    </div>
                </div>
            );
        }

        // Callback Page Component
        function CallbackPageComponent() {
            const [status, setStatus] = React.useState('loading');
            const [error, setError] = React.useState(null);
            const [debugInfo, setDebugInfo] = React.useState('');

            React.useEffect(() => {
                handleCallback();
            }, []);

            async function handleCallback() {
                try {
                    // =================================================================
                    // STEP 1: Extract Authorization Code
                    // =================================================================
                    console.log('🟦 STEP 1: Extracting Authorization Code');
                    
                    const fullUrl = window.location.href;
                    console.log('FULL URL:', fullUrl);
                    setDebugInfo(prev => prev + `Full Callback URL: ${fullUrl}\n`);

                    const params = new URLSearchParams(window.location.search);
                    const code = params.get('code');
                    const state = params.get('state');
                    const errorParam = params.get('error');
                    const errorDescription = params.get('error_description');

                    console.log('Extracted Params:', {
                        'Code Present?': !!code,
                        'Code (first 20 chars)': code ? code.substring(0, 20) + '...' : 'NULL ❌',
                        'State (first 8 chars)': state ? state.substring(0, 8) + '...' : 'NULL ❌',
                        'Error Param': errorParam || 'None',
                        'Error Description': errorDescription || 'None'
                    });

                    setDebugInfo(prev => prev + `\n✓ Authorization Code: ${code ? code.substring(0, 20) + '...' : 'NULL ❌'}`);

                    // Check for Spotify errors first
                    if (errorParam) {
                        let errorMsg = `Spotify Error: ${errorParam}`;
                        if (errorDescription) {
                            errorMsg += ` - ${errorDescription}`;
                        }
                        
                        // Add helpful diagnosis for common errors
                        let diagnosis = '';
                        if (errorParam === 'invalid_request') {
                            diagnosis = '\n\n📋 This usually means:\n' +
                              '• Redirect URI does not match Spotify Dashboard settings\n' +
                              '• Check if you registered: http://127.0.0.1:5500/callback/\n' +
                              '• Make sure there are no duplicate entries\n' +
                              '• Remove any versions without the trailing slash\n\n' +
                              '🔗 Open Spotify Developer Dashboard and verify the Redirect URI';
                        } else if (errorParam === 'invalid_scope') {
                            diagnosis = '\n\n📋 One or more requested scopes are not enabled.\n\n' +
                              '✅ Currently enabled scopes:\n' +
                              '  • user-read-private (Read user data)\n' +
                              '  • user-read-email (Read email)\n\n' +
                              '❌ Optional scopes (disabled by default):\n' +
                              '  • playlist-read-private\n' +
                              '  • playlist-read-public\n' +
                              '  • user-top-read\n\n' +
                              '📝 To enable more scopes:\n' +
                              '1. Go to Spotify Developer Dashboard\n' +
                              '2. Open your app settings\n' +
                              '3. Scroll to "Scopes" section\n' +
                              '4. Check desired permissions\n' +
                              '5. Then restart the app and try again\n';

                        } else if (errorParam === 'invalid_client') {
                            diagnosis = '\n\n📋 Client ID is not valid.\n' +
                              'Check that the Client ID is correct: 060af9faf02a4879bf7081fd088e06cf\n';
                        }
                        
                        console.error('❌ Spotify Authorization Error:');
                        console.error('Error Type:', errorParam);
                        console.error('Description:', errorDescription || 'None provided');
                        console.error('Expected Redirect URI: http://127.0.0.1:5500/callback/');
                        
                        setError(errorMsg + diagnosis);
                        setDebugInfo(prev => prev + `\n❌ Spotify Error: ${errorParam}\n${diagnosis}`);
                        setStatus('error');
                        return;
                    }

                    // Check if code is missing
                    if (!code) {
                        const msg = 'Authorization code missing from callback URL. Please verify the Spotify redirect URI is correct.';
                        console.error('❌ ' + msg);
                        setError(msg);
                        setDebugInfo(prev => prev + `\n❌ ${msg}`);
                        setStatus('error');
                        return;
                    }

                    console.log('✅ Code extracted successfully:', code.substring(0, 20) + '...');
                    setStatus('verifying');

                    // =================================================================
                    // STEP 2: Verify OAuth State (CSRF Protection)
                    // =================================================================
                    console.log('\n🟦 STEP 2: Verifying OAuth State');
                    
                    const { verifyOAuthState } = window.spotifyAuthBridge || {};
                    if (!verifyOAuthState) {
                        throw new Error('verifyOAuthState function not available in auth bridge');
                    }

                    try {
                        verifyOAuthState(state);
                        console.log('✅ OAuth state verified successfully');
                        setDebugInfo(prev => prev + `\n✓ State verified properly`);
                    } catch (stateErr) {
                        console.error('❌ State verification failed:', stateErr.message);
                        setError(`State verification failed: ${stateErr.message}`);
                        setDebugInfo(prev => prev + `\n❌ State verification failed: ${stateErr.message}`);
                        setStatus('error');
                        return;
                    }

                    // =================================================================
                    // STEP 3: Exchange Code for Access Token
                    // =================================================================
                    console.log('\n🟦 STEP 3: Exchanging Authorization Code for Access Token');
                    console.log('Request to: https://accounts.spotify.com/api/token');
                    console.log('Grant Type: authorization_code');
                    console.log('Redirect URI: ' + (window.location.origin + '/callback/'));
                    
                    const { exchangeCodeForToken } = window.spotifyAuthBridge || {};
                    if (!exchangeCodeForToken) {
                        throw new Error('exchangeCodeForToken function not available in auth bridge');
                    }

                    setStatus('exchanging');
                    setDebugInfo(prev => prev + `\n\nExchanging code for token...`);

                    const tokenResponse = await exchangeCodeForToken(code);

                    console.log('✅ Token Exchange Response:', {
                        'Access Token (first 20 chars)': tokenResponse.access_token ? 
                            tokenResponse.access_token.substring(0, 20) + '...' : 'NULL ❌',
                        'Token Type': tokenResponse.token_type || 'N/A',
                        'Expires In': tokenResponse.expires_in + ' seconds',
                        'Scope': tokenResponse.scope || 'N/A'
                    });

                    setDebugInfo(prev => prev + `\n✓ Token received: ${tokenResponse.access_token ? 
                        tokenResponse.access_token.substring(0, 20) + '...' : 'NOT FOUND'}`);

                    // =================================================================
                    // STEP 4: Verify and Store Token
                    // =================================================================
                    console.log('\n🟦 STEP 4: Storing Access Token');

                    if (!tokenResponse.access_token) {
                        throw new Error('Access token not received from Spotify. Response: ' + JSON.stringify(tokenResponse));
                    }

                    // Verify token is stored correctly
                    sessionStorage.setItem('spotify_access_token', tokenResponse.access_token);
                    const storedToken = sessionStorage.getItem('spotify_access_token');
                    
                    console.log('Token stored in sessionStorage:', !!storedToken);
                    console.log('Token validation:', {
                        'Token Stored?': !!storedToken,
                        'Token Matches?': storedToken === tokenResponse.access_token,
                        'Token Length': storedToken ? storedToken.length : 0
                    });

                    setDebugInfo(prev => prev + `\n✓ Token stored in sessionStorage (${storedToken.length} chars)`);

                    // =================================================================
                    // STEP 5: Verify API Can Use Token
                    // =================================================================
                    console.log('\n🟦 STEP 5: Verifying Token Works');
                    console.log('Complete flow ready. Proceeding to dashboard...');

                    setStatus('success');
                    setDebugInfo(prev => prev + `\n\n✅ ALL STEPS COMPLETE - Authorization successful!\nRedirecting to dashboard...`);

                    // Redirect after a short delay for UI feedback
                    setTimeout(() => {
                        console.log('🔄 Redirecting to /spotify-dashboard/');
                        window.location.href = '/spotify-dashboard/';
                    }, 1500);

                } catch (err) {
                    console.error('\n❌ Callback handler error:', err);
                    console.error('Error message:', err.message);
                    console.error('Full error:', err);
                    
                    setError(err.message || 'Failed to complete authorization');
                    setDebugInfo(prev => prev + `\n\n❌ ERROR: ${err.message}`);
                    setStatus('error');
                }
            }

            return (
                <div style={styles.container}>
                    <div style={styles.card}>
                        {status === 'loading' && (
                            <>
                                <div style={styles.spinner}></div>
                                <h2>🔄 Processing Callback...</h2>
                                <p>Extracting authorization code from URL</p>
                            </>
                        )}
                        {status === 'verifying' && (
                            <>
                                <div style={styles.spinner}></div>
                                <h2>✓ Code Extracted</h2>
                                <p>Verifying OAuth state...</p>
                            </>
                        )}
                        {status === 'exchanging' && (
                            <>
                                <div style={styles.spinner}></div>
                                <h2>💱 Exchanging Code for Token</h2>
                                <p>POST to: https://accounts.spotify.com/api/token</p>
                            </>
                        )}
                        {status === 'success' && (
                            <>
                                <div style={styles.successIcon}>✅</div>
                                <h2>Authorization Successful!</h2>
                                <p>Token received and stored. Redirecting to dashboard...</p>
                            </>
                        )}
                        {status === 'error' && (
                            <>
                                <div style={styles.errorIcon}>❌</div>
                                <h2>Authorization Failed</h2>
                                <p style={styles.errorMessage}>{error}</p>
                                <pre style={{
                                    backgroundColor: '#0a0a0a',
                                    color: '#ff6b6b',
                                    padding: '12px',
                                    borderRadius: '6px',
                                    overflow: 'auto',
                                    fontSize: '12px',
                                    maxHeight: '300px',
                                    textAlign: 'left',
                                    margin: '12px 0'
                                }}>
                                    {debugInfo}
                                </pre>
                                <button
                                    style={styles.button}
                                    onClick={() => {
                                        if (window.spotifyAuthBridge?.logout) {
                                            window.spotifyAuthBridge.logout();
                                        }
                                        window.location.href = '/';
                                    }}
                                >
                                    Try Again
                                </button>
                            </>
                        )}
                        {debugInfo && status !== 'error' && (
                            <pre style={{
                                backgroundColor: '#1a1a1a',
                                color: '#1db954',
                                padding: '12px',
                                borderRadius: '6px',
                                overflow: 'auto',
                                fontSize: '11px',
                                maxHeight: '250px',
                                textAlign: 'left',
                                margin: '12px 0',
                                fontFamily: 'monospace'
                            }}>
                                {debugInfo}
                            </pre>
                        )}
                    </div>
                </div>
            );
        }

        // Dashboard Page Component
        function DashboardPageComponent({ onNavigate }) {
            const [user, setUser] = React.useState(null);
            const [playlists, setPlaylists] = React.useState([]);
            const [topTracks, setTopTracks] = React.useState([]);
            const [recommendations, setRecommendations] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState(null);
            const [activeTab, setActiveTab] = React.useState('profile');

            React.useEffect(() => {
                loadData();
            }, []);

            async function loadData() {
                try {
                    setLoading(true);
                    const { getCurrentUser, getUserPlaylists, getUserTopTracks, getRecommendations } = window.spotifyApiBridge || {};
                    if (!getCurrentUser || !getUserPlaylists || !getUserTopTracks || !getRecommendations) {
                        throw new Error('Spotify API bridge not loaded yet.');
                    }

                    const userProfile = await getCurrentUser();
                    setUser(userProfile);
                    console.log('✅ User profile loaded:', userProfile.display_name);

                    const [playlistsResult, topTracksResult] = await Promise.allSettled([
                        getUserPlaylists({ limit: 20 }),
                        getUserTopTracks({ limit: 20, time_range: 'medium_term' }),
                    ]);

                    if (playlistsResult.status === 'fulfilled') {
                        setPlaylists(playlistsResult.value.items || []);
                    } else {
                        console.warn('⚠️ Failed to load playlists:', playlistsResult.reason?.message || playlistsResult.reason);
                        setPlaylists([]);
                    }

                    let tracks = [];
                    if (topTracksResult.status === 'fulfilled') {
                        tracks = topTracksResult.value.items || [];
                        setTopTracks(tracks);
                    } else {
                        console.warn('⚠️ Failed to load top tracks:', topTracksResult.reason?.message || topTracksResult.reason);
                        setTopTracks([]);
                    }

                    if (tracks.length > 0) {
                        try {
                            const seedTrackIds = tracks.slice(0, 3).map(t => t.id).join(',');
                            const recsData = await getRecommendations({
                                seed_tracks: seedTrackIds,
                                limit: 20,
                            });
                            setRecommendations(recsData.tracks || []);
                        } catch (recsErr) {
                            console.warn('⚠️ Failed to load recommendations:', recsErr.message || recsErr);
                            setRecommendations([]);
                        }
                    } else {
                        setRecommendations([]);
                    }

                    setLoading(false);
                } catch (err) {
                    console.error('❌ Error loading dashboard:', err);
                    setError(err.message);
                    setLoading(false);
                }
            }

            const handleLogout = async () => {
                if (window.spotifyAuthBridge?.logout) {
                    window.spotifyAuthBridge.logout();
                }
                window.location.href = '/';
            };

            const handleTrackSelect = (track) => {
                if (!track) {
                    return;
                }

                const spotifyUrl = track.external_urls?.spotify || (track.id ? `https://open.spotify.com/track/${track.id}` : '');
                if (!spotifyUrl) {
                    return;
                }

                localStorage.setItem('selectedTrack', JSON.stringify(track));
                localStorage.setItem('selectedSpotifyUrl', spotifyUrl);
                onNavigate('/player', { track, spotifyUrl });
            };

            const handlePlaylistSelect = (playlist) => {
                if (!playlist) {
                    return;
                }

                const spotifyUrl = playlist.external_urls?.spotify || (playlist.id ? `https://open.spotify.com/playlist/${playlist.id}` : '');
                if (!spotifyUrl) {
                    return;
                }

                localStorage.setItem('selectedSpotifyUrl', spotifyUrl);
                onNavigate('/player', { playlist, spotifyUrl });
            };

            if (loading) {
                return <div style={styles.container}><div style={styles.spinner}></div><p>Loading your Spotify data...</p></div>;
            }

            if (error) {
                return (
                    <div style={styles.container}>
                        <div style={styles.errorBox}>
                            <h2>❌ Error Loading Dashboard</h2>
                            <p>{error}</p>
                            <button style={styles.button} onClick={() => window.location.reload()}>Try Again</button>
                        </div>
                    </div>
                );
            }

            return (
                <div style={styles.page}>
                    <div style={styles.header}>
                        <div style={styles.userInfo}>
                            {user?.images?.[0]?.url && (
                                <img src={user.images[0].url} alt={user.display_name} style={styles.avatar} />
                            )}
                            <div>
                                <h1>{user?.display_name}</h1>
                                <p>{user?.email}</p>
                            </div>
                        </div>
                        <button style={styles.logoutBtn} onClick={handleLogout}>Logout</button>
                    </div>

                    <div style={styles.tabs}>
                        {['profile', 'playlists', 'topTracks', 'recommendations'].map(tab => (
                            <button
                                key={tab}
                                style={{
                                    ...styles.tabBtn,
                                    ...(activeTab === tab ? styles.tabBtnActive : {}),
                                }}
                                onClick={() => setActiveTab(tab)}
                            >
                                {tab === 'profile' && '👤 Profile'}
                                {tab === 'playlists' && '🎵 Playlists'}
                                {tab === 'topTracks' && '⭐ Top Tracks'}
                                {tab === 'recommendations' && '✨ Recommendations'}
                            </button>
                        ))}
                    </div>

                    <div style={styles.content}>
                        {activeTab === 'profile' && (
                            <div>
                                <h2>Your Profile</h2>
                                <div style={styles.profileGrid}>
                                    <div style={styles.profileCard}>
                                        <span style={styles.label}>Followers</span>
                                        <span style={styles.value}>{user?.followers?.total?.toLocaleString()}</span>
                                    </div>
                                    <div style={styles.profileCard}>
                                        <span style={styles.label}>Account Type</span>
                                        <span style={styles.value}>{user?.product === 'premium' ? '🎵 Premium' : 'Free'}</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'playlists' && (
                            <div>
                                <h2>Your Playlists ({playlists.length})</h2>
                                <div style={styles.grid}>
                                    {playlists.map(playlist => (
                                        <button
                                            key={playlist.id}
                                            type="button"
                                            onClick={() => handlePlaylistSelect(playlist)}
                                            style={styles.playlistCard}
                                        >
                                            {playlist.images?.[0]?.url && (
                                                <img src={playlist.images[0].url} alt={playlist.name} style={styles.playlistImage} />
                                            )}
                                            <h3>{playlist.name}</h3>
                                            <p style={styles.inlineHint}>Tap to open this playlist in the in-app player.</p>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'topTracks' && (
                            <div>
                                <h2>Your Top Tracks</h2>
                                <div style={styles.trackList}>
                                    {topTracks.map((track, index) => (
                                        <button
                                            key={track.id}
                                            type="button"
                                            onClick={() => handleTrackSelect(track)}
                                            style={styles.trackItem}
                                        >
                                            <span style={styles.trackIndex}>{index + 1}</span>
                                            <div style={styles.trackInfo}>
                                                <h4>{track.name}</h4>
                                                <p>{track.artists?.map(a => a.name).join(', ')}</p>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'recommendations' && (
                            <div>
                                <h2>Recommended For You</h2>
                                <div style={styles.grid}>
                                    {recommendations.map(track => (
                                        <button
                                            key={track.id}
                                            type="button"
                                            onClick={() => handleTrackSelect(track)}
                                            style={styles.trackCard}
                                        >
                                            {track.album?.images?.[0]?.url && (
                                                <img src={track.album.images[0].url} alt={track.name} style={styles.trackCardImage} />
                                            )}
                                            <h4>{track.name}</h4>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function PlayerPageComponent({ onNavigate }) {
            const [status, setStatus] = React.useState('Preparing player...');

            React.useEffect(() => {
                document.getElementById('home-page').style.display = 'block';

                const spotifyUrlFromState = window.history.state?.spotifyUrl || '';
                const spotifyUrlFromStorage = localStorage.getItem('selectedSpotifyUrl') || '';
                const spotifyUrl = spotifyUrlFromState || spotifyUrlFromStorage;

                if (!spotifyUrl) {
                    onNavigate('/');
                    return () => {
                        document.getElementById('home-page').style.display = 'none';
                    };
                }

                const loadIntoOriginalPlayer = () => {
                    if (window.mdVinylPlayer?.loadSpotifyEmbedByUrl) {
                        const loaded = window.mdVinylPlayer.loadSpotifyEmbedByUrl(spotifyUrl);
                        if (loaded) {
                            setStatus('Loaded in player.');
                            return true;
                        }
                    }
                    return false;
                };

                if (!loadIntoOriginalPlayer()) {
                    const retryId = window.setTimeout(() => {
                        if (!loadIntoOriginalPlayer()) {
                            setStatus('Could not load Spotify link. Go back and try again.');
                        }
                    }, 250);

                    return () => {
                        window.clearTimeout(retryId);
                        document.getElementById('home-page').style.display = 'none';
                    };
                }

                return () => {
                    document.getElementById('home-page').style.display = 'none';
                };
            }, [onNavigate]);

            return (
                <div style={styles.playerRouteOverlay}>
                    <div style={styles.playerRouteCard}>
                        <p style={{ margin: '0 0 10px' }}>Player route active</p>
                        <p style={{ margin: 0, opacity: 0.85 }}>{status}</p>
                        <button type="button" style={styles.button} onClick={() => onNavigate('/spotify-dashboard')}>
                            Back to Dashboard
                        </button>
                    </div>
                </div>
            );
        }

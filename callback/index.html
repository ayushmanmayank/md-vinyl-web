<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Callback</title>
</head>
<body>
  <main style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#3f1120;color:#f7ecef;font-family:Segoe UI,Arial,sans-serif;">
    <section style="background:#4a1728;padding:24px;border-radius:12px;max-width:560px;width:92%;text-align:center;border:1px solid #d9d5ce;">
      <h1 style="margin-top:0;">Spotify Authorization</h1>
      <p id="status" style="margin:0;opacity:.9;">Processing callback...</p>
    </section>
  </main>

  <script type="module">
    import { exchangeCodeForToken, verifyOAuthState } from '../src/spotify/auth.js';

    const statusEl = document.getElementById('status');

    function setStatus(message) {
      if (statusEl) {
        statusEl.textContent = message;
      }
    }

    async function handleCallbackDirectly() {
      try {
        console.log('📍 Callback URL:', window.location.href);

        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const error = params.get('error');
        const errorDescription = params.get('error_description');

        console.log('Callback params:', {
          code: code ? `${code.substring(0, 20)}...` : null,
          state: state ? `${state.substring(0, 8)}...` : null,
          error,
          errorDescription,
        });

        if (error) {
          throw new Error(errorDescription || error);
        }

        if (!code) {
          throw new Error('Authorization code missing from callback URL.');
        }

        verifyOAuthState(state);

        setStatus('Code verified. Exchanging token...');
        await exchangeCodeForToken(code);

        setStatus('Authorization successful. Redirecting...');
        window.location.replace('/spotify-dashboard/');
      } catch (err) {
        console.error('❌ Callback direct handler error:', err);
        setStatus(`Authorization failed: ${err.message || 'Unknown error'}`);

        // Fallback to root callback route for troubleshooting path visibility.
        window.setTimeout(() => {
          const fallbackParams = new URLSearchParams({ route: 'callback' });
          if (window.location.search) {
            const original = new URLSearchParams(window.location.search);
            for (const [key, value] of original.entries()) {
              fallbackParams.set(key, value);
            }
          }
          window.location.replace(`/?${fallbackParams.toString()}`);
        }, 1200);
      }
    }

    handleCallbackDirectly();
  </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="vinylTitle vinylDesc">
  <title id="vinylTitle">MD Vinyl Record</title>
  <desc id="vinylDesc">A black vinyl disc with a cream center label.</desc>

  <defs>
    <radialGradient id="discBase" cx="35%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#2a2d31"/>
      <stop offset="56%" stop-color="#101216"/>
      <stop offset="100%" stop-color="#050609"/>
    </radialGradient>
    <radialGradient id="shine" cx="27%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="label" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fffdf9"/>
      <stop offset="75%" stop-color="#f0ece5"/>
      <stop offset="100%" stop-color="#e9e3d8"/>
    </radialGradient>
  </defs>

  <circle cx="600" cy="600" r="560" fill="url(#discBase)"/>

  <g stroke-linecap="round" fill="none" opacity="0.55">
    <circle cx="600" cy="600" r="520" stroke="#191b1f" stroke-width="2"/>
    <circle cx="600" cy="600" r="500" stroke="#121418" stroke-width="2"/>
    <circle cx="600" cy="600" r="480" stroke="#1c1f24" stroke-width="2"/>
    <circle cx="600" cy="600" r="460" stroke="#101216" stroke-width="2"/>
    <circle cx="600" cy="600" r="440" stroke="#1d2025" stroke-width="2"/>
    <circle cx="600" cy="600" r="420" stroke="#14161a" stroke-width="2"/>
    <circle cx="600" cy="600" r="400" stroke="#1f2328" stroke-width="2"/>
    <circle cx="600" cy="600" r="380" stroke="#121419" stroke-width="2"/>
    <circle cx="600" cy="600" r="360" stroke="#20242a" stroke-width="2"/>
    <circle cx="600" cy="600" r="340" stroke="#121419" stroke-width="2"/>
  </g>

  <circle cx="600" cy="600" r="228" fill="url(#label)"/>
  <circle cx="600" cy="600" r="248" fill="none" stroke="#dcccb5" stroke-width="14"/>
  <circle cx="600" cy="600" r="36" fill="#f8f5ef" stroke="#45484d" stroke-width="7"/>
  <circle cx="600" cy="600" r="8" fill="#272a2f"/>

  <text x="600" y="560" text-anchor="middle" fill="#8b6f57" font-size="64" font-family="Cinzel, serif" letter-spacing="4">MD VINYL</text>
  <text x="600" y="680" text-anchor="middle" fill="#8b6f57" font-size="52" font-family="Cinzel, serif">33 RPM</text>

  <circle cx="600" cy="600" r="560" fill="url(#shine)"/>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting Callback...</title>
</head>
<body>
  <script>
    var legacyHost = 'md-vinyl-web.vercel.app';
    var canonicalHost = 'md-vinyl-web-eight.vercel.app';
    if (window.location.hostname === legacyHost) {
      var canonicalTarget = window.location.protocol + '//' + canonicalHost + window.location.pathname + window.location.search + window.location.hash;
      window.location.replace(canonicalTarget);
    }

    const params = new URLSearchParams(window.location.search || '');
    params.set('route', 'callback');
    window.location.replace('/?' + params.toString());
  </script>
</body>
</html>
